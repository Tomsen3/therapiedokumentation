<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a7f97;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2F4F63;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EEF2F5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Hintergrund -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)" />

  <!-- Innere Karte -->
  <rect x="64" y="64" width="384" height="384" rx="72" ry="72" fill="url(#card)" opacity="0.13" />

  <!-- TD zentriert – y auf 256 = echte Mitte -->
  <text
    x="256"
    y="256"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="220"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="central"
    letter-spacing="-6"
  >TD</text>

  <!-- Dezente Unterlinie -->
  <rect x="88" y="390" width="336" height="5" rx="2.5" fill="#ffffff" opacity="0.28" />
</svg>
